version: '3.9'
services:
  backend:
    image: node:20-bookworm
    working_dir: /app
    command: sh -c "npm ci && npm run start -w backend"
    volumes:
      - ./:/app
    env_file:
      - .env
    ports:
      - "4000:4000"

  frontend:
    image: node:20-bookworm
    working_dir: /app
    command: sh -c "npm ci && npm run dev -w frontend"
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      - VITE_API_BASE_URL=http://backend:4000
    ports:
      - "5173:5173"
    depends_on:
      - backend
